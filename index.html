<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Хроники Торговца</title>

    <link rel="stylesheet" href="main.css">

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Merriweather:wght@300;400;700&display=swap" rel="stylesheet">

    <script src="index.js" defer></script>
</head>
<body>

<div id="game">

    <!-- ПЕРСОНАЖ -->
    <header class="player-header">

        <div id="player-name">
            Торговец
        </div>

        <div class="player-row">
            <span id="player-gold">100 золотых</span>
            <span id="player-transport">Осёл</span>
        </div>

    </header>

    <!-- ЛОКАЦИЯ -->
    <section class="location-card">

        <h2 id="player-city">
            Ривервуд
        </h2>

        <p id="city-description">
            Небольшой сельскохозяйственный город.
        </p>

    </section>

    <!-- КНОПКИ -->
    <section class="actions">

        <button id="market-button">
            Рынок
        </button>

        <button id="stable-button">
            Конюх
        </button>

        <button id="map-button">
            Карта
        </button>

    </section>

    <!-- КАРТА (скрыта по умолчанию) -->
    <section id="map-screen" class="map-screen hidden">

        <div class="map-header">
            Карта королевства
        </div>

        <div id="world-map"></div>

        <button id="close-map">
            Закрыть карту
        </button>

    </section>

</div>

</body>
</html>
