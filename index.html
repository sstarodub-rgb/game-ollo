<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Хроники Торговца</title>

    <link rel="stylesheet" href="main.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Merriweather:wght@300;400;700&display=swap" rel="stylesheet">

    <script src="index.js" defer></script>
</head>
<body>

    <div id="game">

        <header class="hero-panel">

            <h1 class="game-title">
                Хроники Торговца
            </h1>

            <div class="player-bar">

                <div class="stat-card">
                    <span class="stat-label">День</span>
                    <span id="player-day">1</span>
                </div>

                <div class="stat-card">
                    <span class="stat-label">Казна</span>
                    <span id="player-gold">100 золотых</span>
                </div>

                <div class="stat-card">
                    <span class="stat-label">Город</span>
                    <span id="player-city">Ривервуд</span>
                </div>

                <div class="stat-card">
                    <span class="stat-label">Караван</span>
                    <span id="player-transport">Осёл</span>
                </div>

                <div class="stat-card">
                    <span class="stat-label">Груз</span>
                    <span id="player-weight">0 / 100 кг</span>
                </div>

            </div>

        </header>

        <main class="world-layout">

            <section class="panel map-panel">

                <div class="panel-header">
                    Карта Королевства
                </div>

                <div id="world-map">

                    <!-- Города будут добавляться через index.js -->

                </div>

            </section>

            <section class="panel city-panel">

                <div class="panel-header">
                    Сведения о городе
                </div>

                <div id="city-info">

                    <h2 id="city-name">
                        Выберите город
                    </h2>

                    <p id="city-description">
                        Нажмите на город на карте, чтобы увидеть сведения о нём.
                    </p>

                    <div class="city-actions">

                        <button id="travel-button">
                            Отправиться
                        </button>

                        <button id="market-button">
                            Посетить рынок
                        </button>

                    </div>

                </div>

            </section>

            <section class="panel log-panel">

                <div class="panel-header">
                    Хроника путешествий
                </div>

                <div id="game-log">

                    <div class="log-entry">
                        День 1. Ваше торговое приключение начинается.
                    </div>

                </div>

            </section>

        </main>

    </div>

</body>
</html>
