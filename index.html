<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Хроники Торговца</title>

    <link rel="stylesheet" href="./main.css?v=1">
    <link rel="stylesheet" href="./header.css?v=1">
    <link rel="stylesheet" href="./log.css?v=1">

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cormorant+Garamond:wght@400;500;600;700&display=swap" rel="stylesheet">
  </head>

  <body>

    <div id="game">

      <section id="location-section" class="location-card">

        <div id="city-icon" class="location-icon">
          🏡
        </div>

        <div class="location-info">

          <h2 id="player-city-name" class="city-name">
            <span class="city-first-letter">Р</span>ивервуд
          </h2>

          <div id="city-type" class="city-type">
            сельская деревня
          </div>

        </div>

      </section>

      <section id="actions-section" class="actions-panel">

        <button id="market-button">
          Рынок
        </button>

        <button id="stable-button">
          Конюх
        </button>

        <button id="map-button">
          Карта
        </button>

      </section>

      <section id="log-section" class="log-panel">

        <div class="log-title">
          Хроника путешествий
        </div>

        <div id="log-list">
        </div>

      </section>

    </div>

    <script src="./header.js?v=1"></script>
    <script src="./log.js?v=1"></script>
    <script src="./index.js?v=1"></script>

  </body>
</html>
