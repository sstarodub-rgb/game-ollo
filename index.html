<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Хроники Торговца</title>

    <link rel="stylesheet" href="./main.css">
    <link rel="stylesheet" href="./header.css">
    <link rel="stylesheet" href="./log.css">

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Merriweather:wght@300;400;700&display=swap" rel="stylesheet">
  </head>

  <body>

    <div id="game">

      <section class="panel city-panel">
        <div class="panel-header">Локация</div>

        <div id="city-info">
          <h2 id="player-city-name">Ривервуд</h2>
          <p id="city-description">
            Небольшой сельскохозяйственный город.
          </p>
        </div>
      </section>

      <section class="actions-panel">
        <button id="market-button">Рынок</button>
        <button id="stable-button">Конюх</button>
        <button id="map-button">Карта</button>
      </section>

    </div>

    <script src="./header.js"></script>
    <script src="./log.js"></script>
    <script src="./index.js"></script>

  </body>
</html>
