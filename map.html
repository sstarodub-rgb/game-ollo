<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Карта мира</title>
  <link rel="stylesheet" href="./main.css">
  <link rel="stylesheet" href="./header.css">
  <link rel="stylesheet" href="./stable.css">
  <link rel="stylesheet" href="./map.css">
</head>
<body>

  <header id="game-header">
    <div class="stable-header">
      <button id="back-to-city-btn" class="header-back-btn">← Назад</button>
      <div class="stable-title">Карта мира</div>
    </div>
  </header>

  <main id="stable">
    <div id="map-field" class="map-field">
      <svg class="road-svg" viewBox="0 0 100 100" preserveAspectRatio="none">
        <path class="road-line" d="M 50 25 Q 35 40 30 55" />
        <path class="road-line" d="M 50 25 Q 65 40 70 55" />
        <path class="road-line" d="M 30 55 Q 25 70 20 80" />
        <path class="road-line" d="M 30 55 Q 35 70 40 80" />
        <path class="road-line" d="M 70 55 Q 65 70 60 80" />
        <path class="road-line" d="M 70 55 Q 75 70 80 80" />
      </svg>
    </div>

    <div class="actions-panel" style="margin-top: 20px; text-align: center;">
      <button id="travel-btn" class="create-player-btn" disabled>В путь</button>
    </div>
  </main>

  <script src="./cities.js"></script>
  <script src="./routes.js"></script>
  <script src="./map.js"></script>
</body>
</html>
