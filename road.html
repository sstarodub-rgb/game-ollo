<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Путешествие</title>
  <link rel="stylesheet" href="main.css">
  <link rel="stylesheet" href="road.css">
</head>
<body>
  <div id="road-screen">
    <div class="travel-card">
      <h2 id="status-text">Ваш караван в пути...</h2>
      
      <div class="map-container">
        <svg class="road-svg" viewBox="0 0 100 100" preserveAspectRatio="none">
          <path id="road-path" d="M 95 80 Q 50 20 5 80" fill="none" stroke="#6f5632" stroke-width="2" stroke-dasharray="4" />
          
          <g id="character">
            <polygon points="0,-4 4,4 -4,4" fill="#6f5632" />
            <circle id="head" cx="0" cy="-7" r="2" fill="#6f5632" />
            
            <animateMotion dur="8s" repeatCount="1" fill="freeze">
              <mpath xlink:href="#road-path" />
            </animateMotion>
          </g>
        </svg>
      </div>
      
      <p class="hint">Ожидайте прибытия в город</p>
    </div>
  </div>

  <div id="event-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); z-index:9999; justify-content:center; align-items:center; padding: 20px;">
    <div style="background: linear-gradient(to bottom, var(--panel-bg-top), var(--panel-bg-bottom)); border: 1px solid var(--gold); padding: 25px; border-radius: 12px; width: 100%; max-width: 400px; text-align: center; box-shadow: 0 0 20px rgba(0,0,0,0.5);">
      
      <h3 id="event-text" style="color: var(--gold); font-family: var(--font-title); font-size: 20px; margin-bottom: 15px;">Событие</h3>
      
      <p id="event-result" style="color: var(--text-main); font-family: var(--font-text); font-size: 18px; margin-bottom: 25px;"></p>
      
      <button onclick="finishTravel()" style="width: 100%; padding: 12px; border: 1px solid var(--gold); border-radius: 8px; background: linear-gradient(to bottom, var(--button-top), var(--button-bottom)); color: var(--gold-light); font-family: var(--font-title); font-size: 16px; cursor: pointer;">
        Продолжить путь
      </button>
    </div>
  </div>

  <script src="transport.js"></script>
  <script src="events.js"></script>
  <script src="road.js"></script>
</body>
</html>
