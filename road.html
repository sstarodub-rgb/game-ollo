<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Путешествие</title>
  <link rel="stylesheet" href="main.css">
  <link rel="stylesheet" href="road.css">
</head>
<body>
  <div id="road-screen">
    <div class="travel-card">
      <h2 id="status-text">Ваш караван в пути...</h2>
      <div class="map-container">
        <svg class="road-svg" viewBox="0 0 100 100" preserveAspectRatio="none">
          <path id="road-path" d="M 95 80 Q 50 20 5 80" fill="none" stroke="#6f5632" stroke-width="2" stroke-dasharray="4" />
          <g id="character">
            <polygon points="0,-4 4,4 -4,4" fill="#6f5632" />
            <circle id="head" cx="0" cy="-7" r="2" fill="#6f5632" />
            <animateMotion dur="8s" repeatCount="1" fill="freeze">
              <mpath xlink:href="#road-path" />
            </animateMotion>
          </g>
        </svg>
      </div>
      <p class="hint">Ожидайте прибытия в город</p>
    </div>
  </div>

  <div id="event-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:9999; justify-content:center; align-items:center;">
    <div style="background:#dcc8a4; padding:20px; border-radius:10px; width:80%; text-align:center; border: 3px solid #6f5632;">
      <h3 id="event-text">Событие</h3>
      <p id="event-result"></p>
      <button onclick="finishTravel()" style="padding:10px 20px; cursor:pointer;">Продолжить</button>
    </div>
  </div>

  <script src="transport.js"></script>
  <script src="events.js"></script>
  <script src="road.js"></script>
</body>
</html>
