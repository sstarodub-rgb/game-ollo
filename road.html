<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Путешествие</title>
  <link rel="stylesheet" href="main.css">
  <link rel="stylesheet" href="road.css">
</head>
<body>
  <div id="road-screen">
    <div class="travel-card">
      <h2 id="status-text">Ваш караван в пути...</h2>
      
      <div class="map-container">
        <svg class="road-svg" viewBox="0 0 100 100" preserveAspectRatio="none">
          <path id="road-path" d="M 95 80 Q 50 20 5 80" fill="none" stroke="#6f5632" stroke-width="2" stroke-dasharray="4" />
          
          <g id="airship">
            <ellipse cx="0" cy="0" rx="12" ry="6" fill="#d2691e" />
            <rect x="-4" y="4" width="8" height="6" fill="#8b4513" />
            <animateMotion dur="8s" repeatCount="1" fill="freeze">
              <mpath xlink:href="#road-path" />
            </animateMotion>
          </g>
        </svg>
      </div>
      
      <p class="hint">Ожидайте прибытия в город</p>
    </div>
  </div>
  <script src="road.js"></script>
</body>
</html>
